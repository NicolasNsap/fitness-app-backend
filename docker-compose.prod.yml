# Docker Compose para producción (AWS EC2 + RDS)
# Uso: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: nicolasnsap/fitness-app:1.0
    container_name: fitness-app
    network_mode: host
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: always
