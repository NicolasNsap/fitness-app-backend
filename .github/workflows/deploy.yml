name: Deploy to AWS #nombre del workflow

on: #cuando se activa
  push:
    branches: [main]

jobs: #qué trabajos ejecutar
  build-and-deploy: #nombre del trabajo
    runs-on: ubuntu-latest #en que runner

    steps: #pasos a ejecutar
      #1 Descargar el archivo
      - name: Checkout código
        uses: actions/checkout@v4

      #2 Configurar Java 21
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      #3 Compilar con Maven
      - name: Build con Maven
        run: ./mvnw clean package -DskipTests

      #4 Login a Docker HUb
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      #5 Build y Push de imagen de Docker
      - name: Build y Push de imagen de Docker
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fitness-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fitness-app:latest

      #6 Deploy en EC2
      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fitness-app:latest
            docker compose down
            docker compose up -d